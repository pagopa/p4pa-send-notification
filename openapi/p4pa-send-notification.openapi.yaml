openapi: 3.0.3
info:
  title: P4PA-SEND-Service API
  description: API and Models.
  version: 0.0.1
servers:
  - url: "http://localhost:8080/p4pasend"
paths:
  /notification:
    post:
      tags:
        - Notification
      summary: Create notification
      description: Create initial notification
      operationId: createSendNotification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotificationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateNotificationResponse'
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '500':
          description: Internal server error
  /notification/findByOrgIdAndNav:
    get:
      tags:
        - Notification
      summary: get send notification by orgid and nav
      description: get send notification by orgid and nav
      operationId: findSendNotificationByOrgIdAndNav
      parameters:
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: nav
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificationDTO'
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification not found
        '500':
          description: Internal server error
  /notification/{sendNotificationId}:
    get:
      tags:
        - Notification
      summary: get send notification
      description: get send notification
      operationId: getSendNotification
      parameters:
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificationDTO'
        '204':
          description: NotificationDate not found
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification not found
        '500':
          description: Internal server error
    delete:
      tags:
        - Notification
      summary: delete send notification
      description: delete send notification
      operationId: deleteSendNotification
      parameters:
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification not found
        '409':
          description: Wrong notification status
        '500':
          description: Internal server error
  /notification/{sendNotificationId}/start:
    post:
      tags:
        - Notification
      summary: start notification process
      description: Start request to authorize preload file to SEND
      operationId: startNotification
      parameters:
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoadFileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartNotificationResponse'
        '202':
          description: Accepted and waiting for all files
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification or File not found
        '409':
          description: Wrong notification status
        '500':
          description: Internal server error
  /send/{sendNotificationId}/retrieveNotificationDate:
    get:
      tags:
        - Send
      summary: retrieve notification date
      description: Retrieve notification date from send if exists
      operationId: retrieveNotificationDate
      parameters:
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/SendNotificationDTO'
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification not found
        '500':
          description: Internal server error
  /send/{sendNotificationId}/preload:
    post:
      tags:
        - Send
      summary: preload file to SEND process
      description: request to authorize preload file to SEND
      operationId: preloadSendFile
      parameters:
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '208':
          description: Already processed
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification not found
        '409':
          description: Wrong notification status
        '500':
          description: Internal server error
  /send/{sendNotificationId}/load:
    post:
      tags:
        - Send
      summary: load file to SEND archive process
      description: request to load file to SEND archive
      operationId: uploadSendFile
      parameters:
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '208':
          description: Already processed
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification not found
        '409':
          description: Wrong notification status
        '500':
          description: Internal server error
  /send/{sendNotificationId}/delivery:
    post:
      tags:
        - Send
      summary: delivery notification
      description: delivery notification
      operationId: deliveryNotification
      parameters:
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '208':
          description: Already processed
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification not found
        '409':
          description: Wrong notification status
        '500':
          description: Internal server error
  /send/{sendNotificationId}/status:
    get:
      tags:
        - Send
      summary: notification status
      description: notification status
      operationId: notificationStatus
      parameters:
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificationDTO'
        '208':
          description: Already processed
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification not found
        '409':
          description: Wrong notification status
        '500':
          description: Internal server error
  /send/notificationprice:
    get:
      tags:
        - Send
      summary: retrieve notification price
      description: notification price
      operationId: retrieveNotificationPrice
      parameters:
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: nav
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: 'NotificationPriceResponseV23DTO'
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification not found
        '409':
          description: Wrong notification status
        '500':
          description: Internal server error
  /send/streams/events:
    get:
      tags:
        - Streams
      summary: retrieve events by stream
      description: get events from last stream, if streamid is specified return events from that stream
      operationId: getStreamEvents
      parameters:
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: streamId
          in: query
          schema:
            type: string
        - name: lastEventId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamEventsResponse'
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Streams not found
        '500':
          description: Internal server error
security:
  - BearerAuth: []
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    CreateNotificationRequest:
      type: object
      required:
        - organizationId
        - paProtocolNumber
        - recipients
        - notificationFeePolicy
        - physicalCommunicationType
      properties:
        organizationId:
          type: integer
          format: int64
        paProtocolNumber:
          type: string
        recipients:
          type: array
          items:
            $ref: '#/components/schemas/Recipient'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/Document'
        notificationFeePolicy:
          type: string
          enum: [ FLAT_RATE, DELIVERY_MODE ]
        physicalCommunicationType:
          type: string
          enum: [ AR_REGISTERED_LETTER, REGISTERED_LETTER_890 ]
        senderDenomination:
          type: string
        senderTaxId:
          type: string
        amount:
          type: number
        paymentExpirationDate:
          type: string
          format: date
        taxonomyCode:
          type: string
        paFee:
          type: integer
          minimum: 0
          maximum: 100
        vat:
          type: integer
          minimum: 0
          maximum: 100
        pagoPaIntMode:
          type: string
          enum: [ SYNC, ASYNC, NONE ]
    Recipient:
      type: object
      required:
        - recipientType
        - taxId
        - denomination
        - physicalAddress
      properties:
        recipientType:
          type: string
          enum: [PF, PG]
        taxId:
          type: string
        denomination:
          type: string
        physicalAddress:
          $ref: '#/components/schemas/Address'
        digitalDomicile:
          $ref: '#/components/schemas/NotificationDigitalAddress'
        payments:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
    Address:
      type: object
      required:
        - address
        - municipality
      properties:
        address:
          type: string
        zip:
          type: string
        municipality:
          type: string
        province:
          type: string
    Payment:
      type: object
      required:
        - pagoPa
      properties:
        pagoPa:
          $ref: '#/components/schemas/PagoPa'
    PagoPa:
      type: object
      required:
        - noticeCode
        - creditorTaxId
        - applyCost
      properties:
        noticeCode:
          type: string
        creditorTaxId:
          type: string
        applyCost:
          type: boolean
        attachment:
          $ref: '#/components/schemas/Attachment'
    Attachment:
      type: object
      properties:
        digest:
          type: string
        contentType:
          type: string
        fileName:
          type: string
    Document:
      type: object
      properties:
        digest:
          type: string
        contentType:
          type: string
        fileName:
          type: string
    LoadFileRequest:
      type: object
      required:
        - digest
        - fileName
      properties:
        digest:
          type: string
        fileName:
          type: string
    CreateNotificationResponse:
      type: object
      properties:
        sendNotificationId:
          type: string
        preloadUrl:
          type: string
        status:
          type: string
    StartNotificationResponse:
      type: object
      properties:
        workflowId:
          type: string
        runId:
          type: string
    SendNotificationDTO:
      type: object
      required:
        - sendNotificationId
        - organizationId
        - status
        - payments
      properties:
        sendNotificationId:
          type: string
        organizationId:
          type: integer
          format: int64
        iun:
          type: string
        payments:
          type: array
          items:
            $ref: '#/components/schemas/SendNotificationPaymentsDTO'
        status:
          type: 'NotificationStatus'
        errors:
          type: array
          items:
            type: string
    SendNotificationPaymentsDTO:
      type: object
      required:
        - debtPositionId
        - navList
      properties:
        debtPositionId:
          type: integer
          format: int64
        navList:
          type: array
          items:
            type: string
        notificationDate:
          type: string
          format: date-time
    SendNotificationErrorDTO:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - SEND_NOTIFICATION_NOT_FOUND
            - SEND_NOTIFICATION_BAD_REQUEST
            - SEND_NOTIFICATION_GENERIC_ERROR
            - SEND_NOTIFICATION_ALREADY_PROCESSED
        message:
          type: string
    NotificationDigitalAddress:
      required:
        - address
        - type
      type: object
      properties:
        type:
          type: string
          enum:
            - PEC
        address:
          type: string
          pattern: >-
            ^(?:[a-zA-Z0-9!#$%&'*+/=?^_`{|}~-]+(?:\.[a-zA-Z0-9!#$%&'*+/=?^_`{|}~-]+)*|"(?:[\x01-\x08\x0b\x0c\x0e-\x1f\x21\x23-\x5b\x5d-\x7f]|\\[\x01-\x09\x0b\x0c\x0e-\x7f])*")@(?:(?:[a-zA-Z0-9](?:[a-zA-Z0-9-]*[a-zA-Z0-9])?\.)+[a-zA-Z0-9](?:[a-zA-Z0-9-]*[a-zA-Z0-9])?|\[(?:(?:25[0-5]|2[0-4]\d|[01]?\d\d?)\.){3}(?:25[0-5]|2[0-4]\d|[01]?\d\d?|[a-zA-Z0-9-]*[a-zA-Z0-9]:(?:[\x01-\x08\x0b\x0c\x0e-\x1f\x21-\x5a\x53-\x7f]|\\[\x01-\x09\x0b\x0c\x0e-\x7f])+)\])$
          maxLength: 320
    StreamEventsResponse:
      type: array
      items:
        type: "ProgressResponseElementV25DTO"
