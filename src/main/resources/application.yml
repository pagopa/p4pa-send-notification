folders:
  shared: "\${SHARED_FOLDER_ROOT:/shared}"
  send-file-folder: "data/send"
  tmp: "\${TMP_FOLDER:\${java.io.tmpdir}}"

fileshare-public-base-url: "\${FILESHARE_PUBLIC_BASE_URL:}"

rest:
  defaults:
    connection-pool:
      size: "\${DEFAULT_REST_CONNECTION_POOL_SIZE:10}"
      size-per-route: "\${DEFAULT_REST_CONNECTION_POOL_SIZE_PER_ROUTE:5}"
      time-to-live-minutes: "\${DEFAULT_REST_CONNECTION_POOL_TIME_TO_LIVE_MINUTES:10}"
    timeout:
      connect-millis: "\${DEFAULT_REST_TIMEOUT_CONNECT_MILLIS:120000}"
      read-millis: "\${DEFAULT_REST_TIMEOUT_READ_MILLIS:120000}"
  organization:
    base-url: "\${ORGANIZATION_BASE_URL:http://localhost:8081}"
    max-attempts: "\${ORGANIZATION_MAX_ATTEMPTS:3}" # It's counting also the first attempt
    wait-time-millis: "\${ORGANIZATION_WAIT_TIME_MILLIS:500}"
    print-body-when-error: "\${ORGANIZATION_PRINT_BODY_WHEN_ERROR:true}"
  workflow-hub:
    base-url: "\${WORKFLOW_HUB_BASE_URL:http://localhost:8082}/workflowhub"
    max-attempts: "\${WORKFLOW_HUB_MAX_ATTEMPTS:3}" # It's counting also the first attempt
    wait-time-millis: "\${WORKFLOW_HUB_WAIT_TIME_MILLIS:500}"
    print-body-when-error: "\${WORKFLOW_HUB_PRINT_BODY_WHEN_ERROR:true}"
  debt-positions:
    base-url: "\${DEBT_POSITION_BASE_URL:}"
    max-attempts: "\${DEBT_POSITION_MAX_ATTEMPTS:3}" # It's counting also the first attempt
    wait-time-millis: "\${DEBT_POSITION_WAIT_TIME_MILLIS:500}"
    print-body-when-error: "\${DEBT_POSITION_PRINT_BODY_WHEN_ERROR:true}"
  pagopa:
    send:
      base-url: "\${SEND_BASE_URL:}"
      max-attempts: "\${SEND_MAX_ATTEMPTS:3}" # It's counting also the first attempt
      wait-time-millis: "\${SEND_WAIT_TIME_MILLIS:500}"
      print-body-when-error: "\${SEND_PRINT_BODY_WHEN_ERROR:true}"
    pdnd:
      base-url: "\${PDND_BASE_URL:https://hub.internal.dev.p4pa.pagopa.it/p4papdnd}"
      max-attempts: "\${PDND_MAX_ATTEMPTS:3}" # It's counting also the first attempt
      wait-time-millis: "\${PDND_WAIT_TIME_MILLIS:500}"
      print-body-when-error: "\${PDND_PRINT_BODY_WHEN_ERROR:true}"


app:
  fileEncryptPassword: "\${FILE_ENCRYPT_PASSWORD:ENCR_PSW}"

cache:
  pii:
    size: "\${CACHE_PII_SIZE:1000}"
    expire-in: "\${CACHE_PII_MINUTES:60}"
  pdndAccessToken:
    size: "\${CACHE_PDNDACCESSTOKEN_SIZE:100}"
    expire-in: "\${CACHE_PDNDACCESSTOKEN_MINUTES:10}"
